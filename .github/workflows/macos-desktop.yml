name: macOS Desktop

on:
  workflow_dispatch:
    inputs:
      notarize:
        description: Sign and notarize (requires Apple Developer secrets)
        type: boolean
        default: false
      target:
        description: Build target
        type: choice
        options:
          - both-arch
          - arm64
          - x64
          - universal
        default: both-arch
      version:
        description: App version (e.g. 1.0.0)
        type: string
        default: 1.0.0

permissions:
  contents: read

jobs:
  build-arm64:
    if: >-
      inputs.target == 'both-arch' ||
      inputs.target == 'arm64'
    runs-on: macos-14
    env:
      SHOULD_SIGN: ${{ github.event_name == 'workflow_dispatch' && inputs.notarize && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew scripts/macos/*.sh

      - name: Resolve app version
        run: echo "WPS_ADB_TOOL_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Set up JDK 21 (arm64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          architecture: arm64

      - name: Import signing certificate
        if: env.SHOULD_SIGN == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/macos/install-signing-cert.sh

      - name: Build arm64 DMG
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          WPS_ADB_TOOL_VERSION: ${{ env.WPS_ADB_TOOL_VERSION }}
          MACOS_SIGN: ${{ env.SHOULD_SIGN == 'true' && 'true' || 'false' }}
          MACOS_SIGNING_IDENTITY: ${{ env.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PATH: ${{ env.MACOS_KEYCHAIN_PATH }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: bash scripts/macos/build-arch-dmg.sh arm64

      - name: Upload arm64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: WpsAdbTool-macos-arm64
          path: desktopApp/build/ci-artifacts/WpsAdbTool-*-macos-arm64.dmg
          if-no-files-found: error

  build-x64:
    if: >-
      inputs.target == 'both-arch' ||
      inputs.target == 'x64'
    runs-on: macos-14
    env:
      SHOULD_SIGN: ${{ github.event_name == 'workflow_dispatch' && inputs.notarize && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew scripts/macos/*.sh

      - name: Resolve app version
        run: echo "WPS_ADB_TOOL_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Set up JDK 21 (x64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          architecture: x64

      - name: Import signing certificate
        if: env.SHOULD_SIGN == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/macos/install-signing-cert.sh

      - name: Build x64 DMG
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          WPS_ADB_TOOL_VERSION: ${{ env.WPS_ADB_TOOL_VERSION }}
          MACOS_SIGN: ${{ env.SHOULD_SIGN == 'true' && 'true' || 'false' }}
          MACOS_SIGNING_IDENTITY: ${{ env.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PATH: ${{ env.MACOS_KEYCHAIN_PATH }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: bash scripts/macos/build-arch-dmg.sh x64

      - name: Upload x64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: WpsAdbTool-macos-x64
          path: desktopApp/build/ci-artifacts/WpsAdbTool-*-macos-x64.dmg
          if-no-files-found: error

  build-universal:
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.target == 'universal'
    runs-on: macos-14
    env:
      SHOULD_SIGN: ${{ inputs.notarize && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew scripts/macos/*.sh

      - name: Resolve app version
        run: echo "WPS_ADB_TOOL_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Set up JDK 21 (arm64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          architecture: arm64

      - name: Capture arm64 JDK path
        run: echo "JDK_ARM64=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up JDK 21 (x64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          architecture: x64

      - name: Capture x64 JDK path
        run: echo "JDK_X64=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Import signing certificate
        if: env.SHOULD_SIGN == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/macos/install-signing-cert.sh

      - name: Build universal DMG
        env:
          JDK_ARM64: ${{ env.JDK_ARM64 }}
          JDK_X64: ${{ env.JDK_X64 }}
          WPS_ADB_TOOL_VERSION: ${{ env.WPS_ADB_TOOL_VERSION }}
          MACOS_SIGN: ${{ env.SHOULD_SIGN == 'true' && 'true' || 'false' }}
          MACOS_SIGNING_IDENTITY: ${{ env.MACOS_SIGNING_IDENTITY }}
          MACOS_KEYCHAIN_PATH: ${{ env.MACOS_KEYCHAIN_PATH }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: bash scripts/macos/build-universal-dmg.sh

      - name: Upload universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: WpsAdbTool-macos-universal
          path: desktopApp/build/ci-artifacts/WpsAdbTool-*-macos-universal.dmg
          if-no-files-found: error
